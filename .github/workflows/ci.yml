name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Allow the deploy job to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Don't cancel an in-progress Pages deploy; run them in order.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-test:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      # Full build = typecheck + marketing site + hosted customer sites (build:host),
      # so paid sites under /sites/ deploy to Pages alongside the marketing site.
      - run: npm run build
      - name: Upload site artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/marketing/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
